<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FA AI WORKSPACE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1>FA AI</h1>
            </div>
            
            <nav class="sidebar-nav">
                <button class="nav-item active" data-chat="new">
                    <span class="icon">+</span>
                    New Chat
                </button>
                <button class="nav-item" data-chat="history">
                    <span class="icon">📋</span>
                    History
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <span class="icon">🌙</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <div class="chat-header">
                <h2>FA AI Assistant</h2>
            </div>

            <!-- Messages Area -->
            <div class="messages" id="messages">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Hello! I'm FA AI Assistant. How can I help you today?</p>
                    </div>
                    <div class="action-row">
                        <button class="action-btn copy-btn" title="Copy">
                            <span>📋</span>
                        </button>
                        <button class="action-btn like-btn" title="Like">
                            <span>👍</span>
                        </button>
                        <button class="action-btn voice-btn" title="Speak">
                            <span>🔊</span>
                        </button>
                        <button class="action-btn share-btn" title="Share">
                            <span>🔗</span>
                        </button>
                        <button class="action-btn more-btn" title="More">
                            <span>⋮</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="Type your message here..."
                        autocomplete="off"
                    >
                    <button id="sendBtn" class="send-btn" title="Send">
                        <span>➤</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
